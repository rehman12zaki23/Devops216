name: SSH to ec2

on:
  push:
    branches:
      - main

jobs:
  ssh:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: ssh to ec2 instance
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_SSH_PORT }}
          script: |
            mkdir -p mern-project && cd mern-project
            APP_DIR="/home/ubuntu/mern-project/batch216-mern"
            REP_URL="https://github.com/rehman12zaki23/Devops216.git"
            
            if [ -d "$APP_DIR" ]; then
              echo "repo is found"
              cd "$APP_DIR"
              git pull origin main
            else
              echo "REP is Not found"
              git clone "$REP_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi
            
            echo "REPO is Downloaded"
            
            # --- Auto-Deploy with Docker Compose ---
            if [ -f "docker-compose.yml" ]; then
              echo "Starting application with Docker Compose..."
              docker compose down
              docker compose up -d --build
            else
              echo "Error: docker-compose.yml not found!"
              exit 1
            fi
